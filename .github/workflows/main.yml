name: Cloudflare Force Cleanup

on:
  workflow_dispatch:

jobs:
  force-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Run Cleanup
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_EMAIL: ${{ secrets.CF_EMAIL }}
          ACC_ID: ${{ secrets.CF_ACCOUNT_ID }}
        shell: python
        run: |
          import requests
          import os
          import time

          # Fetch secrets from environment
          e = os.getenv("CF_EMAIL")
          k = os.getenv("CF_API_KEY")
          a = os.getenv("ACC_ID")
          h = {"X-Auth-Email": e, "X-Auth-Key": k, "Content-Type": "application/json"}

          def start():
              # Fetch all projects
              u = f"https://api.cloudflare.com/client/v4/accounts/{a}/pages/projects"
              try:
                  res = requests.get(u, headers=h)
                  if res.status_code != 200:
                      print(f"Auth Failed: {res.status_code}")
                      return
                  ps = res.json().get('result', [])
              except:
                  return

              for p in ps:
                  name = p['name']
                  print(f"Processing: {name}")
                  d_url = f"{u}/{name}/deployments"
                  
                  while True:
                      try:
                          # Check current deployments (keep latest 50)
                          r = requests.get(f"{d_url}?per_page=100", headers=h).json()
                          items = r.get('result', [])
                          if not items or len(items) <= 50:
                              print(f"Project {name} is clean.")
                              break
                          
                          # Start deleting from index 50 onwards
                          for d in items[50:]:
                              requests.delete(f"{d_url}/{d['id']}?force=true", headers=h)
                              print(f"Deleted: {d['id']}")
                              time.sleep(2) # 2s gap as requested
                          time.sleep(1)
                      except Exception as ex:
                          print(f"Error: {ex}")
                          break

          if __name__ == "__main__":
              start()
