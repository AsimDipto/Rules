name: Cloudflare Force Cleanup

on:
  deployment_status:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  force-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Purge
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          CF_EMAIL: ${{ secrets.CF_EMAIL }}
          ACC_ID: ${{ secrets.CF_ACCOUNT_ID }}
        shell: python
        run: |
          import requests
          import os
          import time

          EMAIL = os.getenv("CF_EMAIL")
          API_KEY = os.getenv("CF_API_KEY")
          ACC_ID = os.getenv("ACC_ID")

          headers = {
              "X-Auth-Email": EMAIL, 
              "X-Auth-Key": API_KEY, 
              "Content-Type": "application/json"
          }

          def purge():
              u = f"https://api.cloudflare.com/client/v4/accounts/{ACC_ID}/pages/projects"
              try:
                  ps = requests.get(u, headers=headers).json().get('result', [])
              except:
                  return

              for p in ps:
                  name = p['name']
                  d_url = f"{u}/{name}/deployments"
                  
                  while True:
                      try:
                          r = requests.get(f"{d_url}?per_page=100", headers=headers).json()
                          items = r.get('result', [])
                          
                          if not items or len(items) <= 50:
                              break
                          
                          for d in items[50:]:
                              requests.delete(f"{d_url}/{d['id']}?force=true", headers=headers)
                              time.sleep(2)
                          
                          time.sleep(1)
                      except:
                          break

          if __name__ == "__main__":
              purge()
